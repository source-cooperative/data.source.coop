[workspace]
members = [
    "crates/libs/core",
    "crates/libs/sts",
    "crates/libs/oidc-provider",
    "crates/libs/api",
    "crates/runtimes/server",
    "crates/runtimes/cf-workers",
    "crates/cli",
]
# Worker crate is excluded from default builds because it contains !Send
# WASM types that only compile correctly for wasm32 targets. Build it
# separately via: cargo check -p source-coop-cf-workers --target wasm32-unknown-unknown
default-members = [
    "crates/libs/core",
    "crates/libs/sts",
    "crates/libs/oidc-provider",
    "crates/libs/api",
    "crates/runtimes/server",
    "crates/cli",
]
resolver = "2"

[workspace.package]
version = "1.0.4"
edition = "2021"
license = "MIT OR Apache-2.0"

[workspace.dependencies]
# Core
async-trait = "0.1"
thiserror = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
bytes = "1"
http = "1"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4", "js"] }
base64 = "0.22"
hex = "0.4"
url = "2"

# Crypto
hmac = "0.12"
sha2 = { version = "0.10", features = ["oid"] }
rsa = "0.9"

# Object store
object_store = { version = "0.12", default-features = false, features = ["aws"] }
futures = "0.3"

# XML
quick-xml = { version = "0.37", features = ["serialize"] }

# Auth
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json"] }

# Config backends
aws-sdk-dynamodb = "1"
sqlx = { version = "0.8", features = ["runtime-tokio-rustls", "postgres", "chrono"] }

# HTTP body
http-body = "1"

# Web framework
axum = { version = "0.8", default-features = false }
tower-service = "0.3"

# Server runtime
tokio = { version = "1", features = ["full"] }
hyper = { version = "1", features = ["full"] }
hyper-util = { version = "0.1", features = ["full"] }
http-body-util = "0.1"
tower = { version = "0.5", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Internal crates
source-coop-core = { path = "crates/libs/core" }
source-coop-sts = { path = "crates/libs/sts" }
source-coop-oidc-provider = { path = "crates/libs/oidc-provider" }
source-coop-api = { path = "crates/libs/api" }
