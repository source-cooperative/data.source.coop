[package]
authors = ["Anthony Lukach <anthonylukach@gmail.com>"]
edition = "2021"
name = "source-data-proxy"
version = "2.0.0"

[lib]
crate-type = ["cdylib"]
# The cdylib depends on wasm-only crates (worker, wasm-bindgen-futures, web-sys)
# that don't compile on native targets, so we disable `cargo test` for the lib.
test = false

[[test]]
name = "routing"
path = "tests/routing.rs"

[[test]]
name = "pagination"
path = "tests/pagination.rs"

[dependencies]
# Multistore
# TODO: update to published version once encoding-type support is released
multistore = { path = "../../developmentseed/multistore/crates/core", features = ["azure"] }
multistore-path-mapping = { path = "../../developmentseed/multistore/crates/path-mapping" }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# HTTP
http = "1"
percent-encoding = "2"

# Tracing
tracing = "0.1"

# Wasm-only dependencies (Cloudflare Workers runtime)
[target.'cfg(target_arch = "wasm32")'.dependencies]
multistore-cf-workers = { path = "../../developmentseed/multistore/crates/cf-workers", features = ["azure"] }
futures = "0.3"
wasm-bindgen-futures = "0.4"
console_error_panic_hook = "0.1"
web-sys = { version = "0.3", features = [
  "Headers",
  "ReadableStream",
  "Request",
  "Response",
  "ResponseInit",
] }
worker = { version = "=0.7.4", features = ["http"] }
worker-macros = { version = "=0.7.4", features = ["http"] }
