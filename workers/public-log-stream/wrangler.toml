name = "public-log-stream"
main = "src/index.ts"
compatibility_date = "2026-03-17"

routes = [
  {pattern = "logs.source.coop/*", zone_name = "coolnewgeo.com"},
]

[[durable_objects.bindings]]
name = "LOCATION_HUB"
class_name = "LocationHub"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["LocationHub"]

[vars]
EMIT_INTERVAL_MS = "500"
MAX_PRODUCTS_PER_COLO = "5"
CORS_ORIGIN = "*"

[env.staging]
routes = [
  {pattern = "logs.staging.source.coop/*", zone_name = "coolnewgeo.com"},
]

[env.staging.vars]
EMIT_INTERVAL_MS = "500"
MAX_PRODUCTS_PER_COLO = "5"
CORS_ORIGIN = "*"

[[env.staging.durable_objects.bindings]]
name = "LOCATION_HUB"
class_name = "LocationHub"
