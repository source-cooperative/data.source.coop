# s3-proxy configuration example
#
# This file defines the virtual buckets, IAM roles, and long-lived
# credentials that the proxy serves.

# =============================================================================
# Virtual Buckets
# =============================================================================

# A publicly accessible bucket (anonymous reads allowed)
[[buckets]]
name = "public-data"
backend_endpoint = "https://s3.us-east-1.amazonaws.com"
backend_bucket = "my-company-public-assets"
backend_region = "us-east-1"
backend_access_key_id = "AKIAIOSFODNN7EXAMPLE"
backend_secret_access_key = "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"
anonymous_access = true
allowed_roles = []

# A private bucket backed by MinIO
[[buckets]]
name = "ml-artifacts"
backend_endpoint = "https://minio.internal:9000"
backend_bucket = "ml-pipeline-artifacts"
backend_prefix = "v2"
backend_region = "us-east-1"
backend_access_key_id = "minioadmin"
backend_secret_access_key = "minioadmin"
anonymous_access = false
allowed_roles = ["github-actions-deployer"]

# Another private bucket on a different S3-compatible service
[[buckets]]
name = "deploy-bundles"
backend_endpoint = "https://s3.us-west-2.amazonaws.com"
backend_bucket = "prod-deploy-bundles"
backend_region = "us-west-2"
backend_access_key_id = "AKIAI44QH8DHBEXAMPLE"
backend_secret_access_key = "je7MtGbClwBF/2Zp9Utk/h3yCo8nvbEXAMPLEKEY"
anonymous_access = false
allowed_roles = ["github-actions-deployer", "ci-readonly"]

# =============================================================================
# IAM Roles (for STS AssumeRoleWithWebIdentity)
# =============================================================================

# Role for GitHub Actions CI/CD pipelines
[[roles]]
role_id = "github-actions-deployer"
name = "GitHub Actions Deploy Role"
trusted_oidc_issuers = ["https://token.actions.githubusercontent.com"]
required_audience = "sts.s3proxy.example.com"
# Only allow specific repos/branches
subject_conditions = [
    "repo:myorg/myapp:ref:refs/heads/main",
    "repo:myorg/myapp:ref:refs/heads/release/*",
    "repo:myorg/infrastructure:*",
]
max_session_duration_secs = 3600

[[roles.allowed_scopes]]
bucket = "ml-artifacts"
prefixes = ["models/", "datasets/"]
actions = ["get_object", "head_object", "put_object", "create_multipart_upload", "upload_part", "complete_multipart_upload"]

[[roles.allowed_scopes]]
bucket = "deploy-bundles"
prefixes = []  # full bucket access
actions = ["get_object", "head_object", "put_object", "create_multipart_upload", "upload_part", "complete_multipart_upload"]

# Read-only role for CI
[[roles]]
role_id = "ci-readonly"
name = "CI Read-Only Role"
trusted_oidc_issuers = ["https://token.actions.githubusercontent.com"]
subject_conditions = ["repo:myorg/*"]
max_session_duration_secs = 1800

[[roles.allowed_scopes]]
bucket = "deploy-bundles"
prefixes = []
actions = ["get_object", "head_object", "list_bucket"]

# =============================================================================
# Long-Lived Credentials
# =============================================================================

# Service account for an internal tool
[[credentials]]
access_key_id = "AKPROXY00000EXAMPLE"
secret_access_key = "proxy/secret/key/EXAMPLE000000000000"
principal_name = "internal-dashboard"
created_at = "2024-01-15T00:00:00Z"
enabled = true

[[credentials.allowed_scopes]]
bucket = "public-data"
prefixes = []
actions = ["get_object", "head_object", "list_bucket"]

[[credentials.allowed_scopes]]
bucket = "ml-artifacts"
prefixes = ["models/production/"]
actions = ["get_object", "head_object"]
