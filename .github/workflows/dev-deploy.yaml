name: Deploy to Dev

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy_commit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@d632683dd7b4114ad314bca15554477dd762a938 # v4.2.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::417712557820:role/GithubDeployRole
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build, tag, and push docker image to Amazon ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: source-data-proxy
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker buildx build -t $REGISTRY/$REPOSITORY:$IMAGE_TAG --push .
      - name: Render Amazon ECS task definition
        id: render-data-proxy-container
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition-family: source-data-proxy
          container-name: source-data-proxy
          image: 417712557820.dkr.ecr.us-east-1.amazonaws.com/source-data-proxy:${{ github.sha }}
      - name: Deploy to Amazon ECS service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-data-proxy-container.outputs.task-definition }}
          service: source-data-proxy
          cluster: SourceCooperative-Dev
      - name: Notify Slack
        uses: slackapi/slack-github-action@v2.1.0
        with:
          payload: |
            {
          # TODO: These links need work
              "text": "🚀 *Deploying to Source Data Proxy Dev!*\n• ${{ github.event_name == 'workflow_dispatch' && format('<Manual Trigger: {0}', github.event.workflow_dispatch.ref) || format('Release: <{0}|{1}>', github.event.release.html_url, github.event.release.tag_name) }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.RELEASEBOT_WEBHOOK_URL }}