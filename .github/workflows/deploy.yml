name: Deploy

on:
  workflow_call:
    inputs:
      worker_name:
        description: "Cloudflare Worker name"
        required: true
        type: string
      wrangler_env:
        description: "Wrangler environment (e.g. staging). Leave empty for production."
        required: false
        type: string
        default: ""
      environment:
        description: "GitHub environment name (preview, staging, production)"
        required: true
        type: string
    outputs:
      deploy_url:
        description: "The deployed worker URL"
        value: ${{ jobs.deploy.outputs.deploy_url }}
    secrets:
      CLOUDFLARE_API_TOKEN:
        required: true
      CLOUDFLARE_ACCOUNT_ID:
        required: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      deploy_url: ${{ steps.url.outputs.deploy_url }}
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Deploy worker
        run: |
          EXTRA_ARGS=""
          if [ -n "${{ inputs.wrangler_env }}" ]; then
            EXTRA_ARGS="--env ${{ inputs.wrangler_env }}"
          fi
          npx wrangler@3 deploy \
            --name "${{ inputs.worker_name }}" \
            $EXTRA_ARGS

      - name: Get deploy URL
        id: url
        run: |
          URL="https://${{ inputs.worker_name }}.${{ vars.CLOUDFLARE_WORKERS_SUBDOMAIN }}.workers.dev"
          echo "deploy_url=$URL" >> "$GITHUB_OUTPUT"
