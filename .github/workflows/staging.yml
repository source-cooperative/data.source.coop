name: Staging

on:
  push:
    branches: [main]

concurrency:
  group: staging
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy & Test
    needs: deploy-public-log-stream
    uses: ./.github/workflows/deploy.yml
    with:
      wrangler_env: staging
      environment: staging
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      OIDC_PROVIDER_KEY: ${{ secrets.OIDC_PROVIDER_KEY }}
      SESSION_TOKEN_KEY: ${{ secrets.SESSION_TOKEN_KEY }}
      OIDC_PROVIDER_KEY_PREVIOUS: ${{ secrets.OIDC_PROVIDER_KEY_PREVIOUS }}
      IP_HASH_SALT: ${{ secrets.IP_HASH_SALT }}

  deploy-public-log-stream:
    name: Deploy Public Log Stream
    uses: ./.github/workflows/deploy-public-log-stream.yml
    with:
      wrangler_env: staging
      environment: staging
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  federation-smoke:
    # The only home of real federated e2e (AssumeRoleWithWebIdentity against
    # the deployed worker, which legitimately holds the staging signing key —
    # CI's local worker signs with a throwaway on purpose). Dormant-but-visible
    # until the FEDERATION_TEST_* repo variables point at a federated product:
    # the job shows as skipped, not silently green.
    name: Federation Smoke Test
    needs: deploy
    if: vars.FEDERATION_TEST_ACCOUNT != ''
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Run federation smoke tests
        env:
          PROXY_URL: ${{ needs.deploy.outputs.deploy_url }}
          FEDERATION_TEST_ACCOUNT: ${{ vars.FEDERATION_TEST_ACCOUNT }}
          FEDERATION_TEST_PRODUCT: ${{ vars.FEDERATION_TEST_PRODUCT }}
          FEDERATION_TEST_KEY: ${{ vars.FEDERATION_TEST_KEY }}
          FEDERATION_RESTRICTED_PRODUCT: ${{ vars.FEDERATION_RESTRICTED_PRODUCT }}
        run: uvx --with requests pytest tests/test_federation.py -v
