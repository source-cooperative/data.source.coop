name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --target wasm32-unknown-unknown -- -D warnings

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test

  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --target wasm32-unknown-unknown

  build:
    name: Build Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install worker-build
        run: cargo install worker-build@0.7.5
      - name: Build WASM worker
        run: worker-build --release
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: worker-build
          path: build/
          retention-days: 1

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
      # Mint a GitHub OIDC token as the write tests' caller identity — the
      # worker verifies it against GitHub's JWKS (AUTH_ISSUER below).
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: worker-build
          path: build/
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: astral-sh/setup-uv@v5
      - name: Install wrangler
        run: npm install -g wrangler@3
      - name: Generate test secrets
        # Required by `load_config` in src/config.rs (`JwtSigner::from_pem` and
        # `TokenKey::from_base64` validate at startup). The signing key is a
        # throwaway: CI never holds a real signing identity, so a compromised
        # dependency in this job can't mint federation assertions any AWS role
        # trusts. Federated end-to-end coverage lives in the deployed-environment
        # smoke tests (tests/test_federation.py, wired into staging.yml) instead.
        # Inbound callers authenticate with GitHub Actions OIDC tokens:
        # AUTH_ISSUER points at GitHub and AUTH_AUDIENCE matches the audience
        # requested in "Mint caller identity token" below.
        run: |
          {
            openssl genpkey -algorithm RSA -out /tmp/oidc.pem -pkeyopt rsa_keygen_bits:2048
            printf 'OIDC_PROVIDER_KEY="%s"\n' "$(cat /tmp/oidc.pem)"
            echo "SESSION_TOKEN_KEY=$(openssl rand -base64 32)"
            echo "AUTH_ISSUER=https://token.actions.githubusercontent.com"
            echo "AUTH_AUDIENCE=source-data-proxy-ci"
            echo "SOURCE_API_URL=http://localhost:9000"
          } > .dev.vars
      - name: Mint caller identity token (GitHub OIDC)
        # Fork PRs run without id-token permission; the credentialed write
        # tests then skip (see tests/test_writes.py). Same-repo runs MUST
        # mint: without this guard, a lost `id-token: write` permission or a
        # transient mint failure would silently skip the credentialed tier
        # while CI stays green. (Also note bare `run:` uses bash without
        # pipefail — unguarded, a failed curl would export an empty or
        # literal-"null" token.)
        env:
          EXPECT_OIDC: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
        run: |
          set -euo pipefail
          if [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ]; then
            if [ "$EXPECT_OIDC" = "true" ]; then
              echo "::error::GitHub OIDC unavailable on a same-repo run — was the id-token permission removed?"
              exit 1
            fi
            echo "GitHub OIDC unavailable (fork PR) — credentialed write tests will skip"
            exit 0
          fi
          token=$(curl -sSf -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=source-data-proxy-ci" | jq -r '.value')
          if [ -z "$token" ] || [ "$token" = "null" ]; then
            echo "::error::OIDC token mint returned no value"
            exit 1
          fi
          echo "::add-mask::$token"
          echo "CI_WRITE_ID_TOKEN=$token" >> "$GITHUB_ENV"
      - name: Start Source API stub
        # Pins the control plane: the live API's data connection grew an
        # s3_web_identity_role that CI's throwaway key can't sign (every object
        # read 502'd). The stub serves an unsigned connection; object reads
        # still hit the real public bucket. See tests/stub_api.py.
        run: |
          python3 tests/stub_api.py &
          curl --retry 30 --retry-delay 1 --retry-connrefused --silent --fail \
            http://localhost:9000/api/v1/products/cholmes/admin-boundaries > /dev/null
      - name: Start wrangler dev
        run: |
          # Skip the build command (the artifact is prebuilt). Scope the
          # rewrite to the [build] section so other `command =` lines that
          # may appear later in the config are untouched.
          sed -i '/^\[build\]/,/^\[/ s/^command = .*/command = "echo skip"/' wrangler.toml
          wrangler dev --port 8787 &
          curl --retry 120 --retry-delay 1 --retry-connrefused --silent --fail http://localhost:8787/ > /dev/null
          echo "Server ready"
      - name: Run integration tests
        # Contract tests are excluded: they hit the live prod API, so they run
        # on a schedule instead (.github/workflows/contract.yml) — a prod
        # outage must not redden PRs the way live control-plane drift used to.
        run: uvx --with requests --with boto3 pytest tests/ -v --ignore=tests/test_contract.py

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - run: cargo audit
